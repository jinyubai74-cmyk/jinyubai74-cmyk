<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>酒吧长谈</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background-color: #ffffff;
            font-family: 'Noto Serif SC', serif; color: #333; height: 100vh; overflow: hidden; display: flex; justify-content: center; align-items: center;
        }
        .hidden { display: none !important; }
        .sketch-border { border: 2px solid #000; border-radius: 255px 15px 225px 15px/15px 225px 15px 255px; }
        
        #btn-back {
            position: absolute; top: 20px; left: 20px; z-index: 1000;
            background: #fff; border: 2px solid #000; border-radius: 12px;
            padding: 8px 15px; font-family: inherit; font-size: 14px; font-weight: bold;
            color: #000; cursor: pointer; transition: all 0.2s;
        }
        #btn-back:hover { background: #000; color: #fff; transform: translateY(-2px); }

        .btn-option {
            font-family: inherit; font-size: 14px; color: #000; padding: 10px 18px; cursor: pointer; background: #fff;
            border: 2px solid #000; border-radius: 255px 15px 225px 15px/15px 225px 15px 255px;
            transition: all 0.2s ease;
            -webkit-tap-highlight-color: transparent;
        }
        .btn-option:hover:not(:disabled) { background: #000; color: #fff; transform: translate(-2px, -2px); box-shadow: 4px 4px 0px rgba(0, 0, 0, 0.15); }
        .btn-option:active { transform: translate(0, 0); box-shadow: none; }
        .btn-option:disabled { opacity: 0.5; cursor: not-allowed; border-color: #ccc; color: #999; }
        .btn-drink-action { border-color: #000; color: #000; font-weight: bold; }
        .btn-drink-action:hover:not(:disabled) { background: #000; color: #fff; }

        .custom-input-container { display: flex; gap: 12px; width: 100%; max-width: 650px; justify-content: center; margin-bottom: 5px; }
        .custom-input { flex: 1; padding: 12px 18px; border: 2px solid #ccc; border-radius: 25px; font-family: inherit; font-size: 15px; outline: none; background: #fafafa; transition: all 0.3s; color: #000; -webkit-appearance: none;}
        .custom-input:focus { border-color: #000; background: #fff; box-shadow: 0 0 8px rgba(0,0,0,0.1);}

        /* 选人界面 */
        #screen-selection { 
            text-align: center; width: 100%; max-width: 900px; padding: 20px; 
            max-height: 100vh; overflow-y: auto; 
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        #screen-selection h1 { font-size: 48px; margin-bottom: 5px; letter-spacing: 6px; font-weight: 700; color: #000;}
        .subtitle-en { color: #888; font-size: 14px; letter-spacing: 3px; margin-bottom: 25px; font-family: sans-serif; text-transform: uppercase; }
        #selection-hint { color: #555; margin-bottom: 30px; font-size: 16px; letter-spacing: 1px;}
        
        .grid-container { display: grid; grid-template-columns: repeat(3, 1fr); gap: 40px; justify-items: center; margin-bottom: 30px; width: 100%;}
        .writer-card { cursor: pointer; transition: transform 0.3s; display: flex; flex-direction: column; align-items: center; -webkit-tap-highlight-color: transparent;}
        
        .avatar-circle { 
            width: 120px; height: 120px; 
            border-radius: 50%; 
            border: 2px solid #000; 
            background-color: #fff; 
            margin-bottom: 15px; 
            overflow: hidden; 
            display: flex; justify-content: center; align-items: center;
            transition: all 0.2s;
        }
        .writer-card.selected .avatar-circle { border-width: 4px; border-color: #000; box-shadow: 4px 4px 0px rgba(0,0,0,0.15); transform: scale(1.05); }
        .avatar-circle img { 
            width: 100%; height: 100%; 
            object-fit: cover; 
            object-position: center;
            transform: scale(1.2); 
        }
        .writer-name { font-size: 16px; font-weight: 700; background: #fff; padding: 4px 18px; border: 2px solid #000; text-align: center; color: #000;}

        /* 吧台界面 */
        #screen-bar { width: 100%; height: 100%; display: flex; flex-direction: column; position: relative; }
        .bar-scene { 
            flex: 1; 
            position: relative; 
            background-image: url('IMG_2330.jpg'); 
            background-size: cover; 
            background-position: center bottom;
            background-repeat: no-repeat;
            border-bottom: 2px solid #000;
        }
        
        @keyframes walkIn { 0% { transform: translate(-80px, 0); opacity: 0; } 100% { transform: translate(0, 0); opacity: 1; } }
        @keyframes fadeOutUp { to { opacity: 0; transform: translateY(-50px); } }
        
        .bar-characters { position: absolute; bottom: 8%; left: 2%; right: 2%; display: flex; justify-content: center; gap: 4vw; align-items: flex-end; }
        .seated-character { display: flex; flex-direction: column; align-items: center; animation: walkIn 1.2s forwards ease-out; position: relative; cursor: pointer; transition: all 0.2s; }
        .seated-character:hover { transform: translateY(-5px); }
