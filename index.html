<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>酒吧长谈</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        html, body {
            width: 100%; height: 100%; margin: 0; padding: 0; overflow: hidden;
        }
        
        body {
            background-color: #ffffff;
            font-family: 'Noto Serif SC', serif; color: #333;
            display: flex; justify-content: center; align-items: center;
        }
        
        .hidden { display: none !important; }
        .sketch-border { border: 2px solid #000; border-radius: 255px 15px 225px 15px/15px 225px 15px 255px; }
        
        #btn-back {
            position: absolute; top: 20px; left: 20px; z-index: 1000;
            background: #fff; border: 2px solid #000; border-radius: 12px;
            padding: 8px 15px; font-family: inherit; font-size: 14px; font-weight: bold;
            color: #000; cursor: pointer; transition: all 0.2s;
        }
        #btn-back:hover { background: #000; color: #fff; transform: translateY(-2px); }

        .btn-option {
            font-family: inherit; font-size: 14px; color: #000; padding: 10px 18px; cursor: pointer; background: #fff;
            border: 2px solid #000; border-radius: 255px 15px 225px 15px/15px 225px 15px 255px;
            transition: all 0.2s ease;
            -webkit-tap-highlight-color: transparent;
        }
        
        /* 手机端禁用悬停黑底，仅电脑端生效 */
        @media (hover: hover) {
            .btn-option:hover:not(:disabled) { background: #000; color: #fff; transform: translate(-2px, -2px); box-shadow: 4px 4px 0px rgba(0, 0, 0, 0.15); }
        }
        .btn-option:active:not(:disabled) { background: #000; color: #fff; transform: translate(0, 0); box-shadow: none; }
        .btn-option:disabled { opacity: 0.5; cursor: not-allowed; border-color: #ccc; color: #999; }
        
        .btn-drink-action { border-color: #000; color: #000; font-weight: bold; }
        .btn-drink-action:active:not(:disabled) { background: #000; color: #fff; }

        .custom-input-container { display: flex; gap: 12px; width: 100%; max-width: 650px; justify-content: center; margin-bottom: 5px; }
        .custom-input { flex: 1; padding: 12px 18px; border: 2px solid #000; border-radius: 25px; font-family: inherit; font-size: 15px; outline: none; background: #fafafa; transition: all 0.3s; color: #000; -webkit-appearance: none;}
        .custom-input:focus { border-color: #000; background: #fff; box-shadow: 0 0 8px rgba(0,0,0,0.1);}

        /* 选人界面 */
        #screen-selection { 
            text-align: center; width: 100%; max-width: 900px; padding: 20px; padding-top: 8vh;
            height: 100%; overflow-y: auto; -webkit-overflow-scrolling: touch;
            display: block; 
        }
        #screen-selection h1 { font-size: 48px; margin-bottom: 5px; letter-spacing: 6px; font-weight: 700; color: #000;}
        .subtitle-en { color: #888; font-size: 14px; letter-spacing: 3px; margin-bottom: 25px; font-family: sans-serif; text-transform: uppercase; }
        #selection-hint { color: #555; margin-bottom: 30px; font-size: 16px; letter-spacing: 1px;}
        
        .grid-container { display: grid; grid-template-columns: repeat(3, 1fr); gap: 40px; justify-items: center; margin-bottom: 30px; width: 100%;}
        .writer-card { cursor: pointer; transition: transform 0.3s; display: flex; flex-direction: column; align-items: center; -webkit-tap-highlight-color: transparent;}
        
        .avatar-circle { 
            width: 120px; height: 120px; 
            border-radius: 50%; 
            border: 2px solid #000; 
            background-color: #fff; 
            margin-bottom: 15px; 
            overflow: hidden; 
            display: flex; justify-content: center; align-items: center;
            transition: all 0.2s;
        }
        .writer-card.selected .avatar-circle { border-width: 4px; border-color: #000; box-shadow: 4px 4px 0px rgba(0,0,0,0.15); transform: scale(1.05); }
        .avatar-circle img { 
            width: 100%; height: 100%; 
            object-fit: cover; 
            object-position: center;
            transform: scale(1.2); 
        }
        .writer-name { font-size: 16px; font-weight: 700; background: #fff; padding: 4px 18px; border: 2px solid #000; text-align: center; color: #000;}

        /* 吧台界面结构复原：上方吧台，下方交互 */
        #screen-bar { width: 100%; height: 100%; display: flex; flex-direction: column; position: relative; }
        
        .bar-scene { 
            flex: 1; 
            position: relative; 
            background-image: url('IMG_2330.jpg?v=3'); 
            background-size: cover; 
            background-position: center bottom;
            background-repeat: no-repeat;
        }
        
        @keyframes walkIn { 0% { transform: translate(-80px, 0); opacity: 0; } 100% { transform: translate(0, 0); opacity: 1; } }
        @keyframes fadeOutUp { to { opacity: 0; transform: translateY(-50px); } }
        
        .bar-characters { position: absolute; bottom: 8%; left: 2%; right: 2%; display: flex; justify-content: center; gap: 4vw; align-items: flex-end; }
        .seated-character { display: flex; flex-direction: column; align-items: center; animation: walkIn 1.2s forwards ease-out; position: relative; cursor: pointer; transition: all 0.2s; }
        .seated-character:hover { transform: translateY(-5px); }
        .seated-character.active-chat .avatar-circle { box-shadow: 0 0 0 4px rgba(0, 0, 0, 0.2); border-color: #000; }
        .left-bar { animation: fadeOutUp 2s forwards !important; pointer-events: none; }
        
        .cups-area { display: flex; flex-wrap: wrap; justify-content: center; min-height: 24px; font-size: 12px; color: #000; letter-spacing: 4px; margin-top: 12px; max-width: 120px; }

        .interaction-area { height: 60%; padding: 20px 10%; display: flex; flex-direction: column; align-items: center; background: #ffffff; position: relative;}
        .chat-box { width: 100%; max-width: 850px; flex: 1; overflow-y: auto; padding: 25px 40px; margin-bottom: 15px; background: #fff; display: flex; flex-direction: column; gap: 20px; scrollbar-width: thin; scrollbar-color: #ddd transparent; -webkit-overflow-scrolling: touch; }
        
        .message { line-height: 1.8; font-size: 16px; color: #000; max-width: 90%; word-wrap: break-word;}
        .msg-sys { color: #666; font-size: 14px; font-style: italic; align-self: center; text-align: center; }
        .msg-writer { align-self: flex-start; border-left: 3px solid #000; padding-left: 15px;}
        .msg-writer strong { color: #000; margin-right: 12px; font-weight: bold; font-size: 15px;}
        .msg-you { align-self: flex-end; text-align: left; border-right: 3px solid #000; padding-right: 15px;}
        .msg-you strong { color: #000; margin-right: 12px; font-weight: bold; font-size: 15px;}

        .control-panel { width: 100%; max-width: 850px; display: flex; flex-direction: column; gap: 12px; min-height: 90px; justify-content: center; align-items: center;}
        .options-row { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; width: 100%; }

        .thinking-text { color: #888; font-style: italic; font-size: 14px; align-self: center; }
        
        /* 极简直角边框全屏图标 */
        #btn-fullscreen-chat {
            position: absolute; top: 15px; right: 20px;
            width: 28px; height: 28px; cursor: pointer; z-index: 10;
            display: flex; justify-content: center; align-items: center;
            opacity: 0.35; transition: all 0.2s; -webkit-tap-highlight-color: transparent;
        }
        #btn-fullscreen-chat:hover { opacity: 0.8; transform: scale(1.05); }
        
        .chat-fullscreen-mode .bar-scene { display: none !important; }
        .chat-fullscreen-mode .control-panel { display: none !important; }
        .chat-fullscreen-mode .interaction-area { height: 100% !important; padding-top: 45px !important; }
        .chat-fullscreen-mode #btn-back { display: none !important; }

        @media (max-width: 768px) {
            #screen-selection h1 { font-size: 32px; letter-spacing: 4px; margin-top: 15px; }
            .subtitle-en { font-size: 12px; margin-bottom: 15px; }
            #selection-hint { font-size: 14px; margin-bottom: 25px; }
            
            .grid-container { grid-template-columns: repeat(2, 1fr); gap: 20px 25px; margin-bottom: 25px;}
            .avatar-circle { width: 95px; height: 95px; margin-bottom: 10px; }
            .writer-name { font-size: 14px; padding: 4px 12px; }

            #btn-back { top: 15px; left: 15px; padding: 6px 12px; font-size: 12px; }
            #btn-fullscreen-chat { right: 10px; top: 10px; }

            .interaction-area { height: 68%; padding: 15px 4%; }
            .chat-box { padding: 15px 20px; gap: 15px; border-radius: 8px; margin-bottom: 12px; }
            
            .bar-scene {
                background-size: 320% auto; 
                background-position: 85% bottom;
            }

            .bar-characters { gap: 15px; bottom: 8px; }
            .seated-character .avatar-circle { width: 90px; height: 90px; border-width: 2px; margin-bottom: 8px;}
            .writer-card.selected .avatar-circle { border-width: 3px; }
            
            .message { font-size: 15px; line-height: 1.6; max-width: 95%; }
            .msg-writer { padding-left: 10px; }
            .msg-you { padding-right: 10px; }
            
            .custom-input { padding: 10px 15px; font-size: 14px; }
            .btn-option { padding: 8px 12px; font-size: 13px; }
            .cups-area { font-size: 10px; letter-spacing: 2px; margin-top: 5px; }
        }

        @media (max-width: 480px) {
            .avatar-circle { width: 90px; height: 90px; } 
            .interaction-area { height: 70%; padding: 12px 3%; }
            
            .seated-character .avatar-circle { width: 85px; height: 85px; }
            .writer-name { font-size: 12px; padding: 2px 8px; border-width: 1px;}
            .bar-characters { gap: 12px; bottom: 8px; } 
        }
    </style>
</head>
<body>

    <div id="screen-selection">
        <h1>酒吧长谈</h1>
        <div class="subtitle-en">DRINK TONIGHT</div>
        <p id="selection-hint">请邀请入座</p>
        <div class="grid-container">
            <div class="writer-card" data-id="marquez">
                <div class="avatar-circle"><img src="IMG_2323.jpg?v=3"></div>
                <div class="writer-name sketch-border">马尔克斯</div>
            </div>
            <div class="writer-card" data-id="agatha">
                <div class="avatar-circle"><img src="IMG_2324.jpg?v=3"></div>
                <div class="writer-name sketch-border">阿加莎</div>
            </div>
            <div class="writer-card" data-id="woolf">
                <div class="avatar-circle"><img src="IMG_2325.jpg?v=3"></div>
                <div class="writer-name sketch-border">伍尔夫</div>
            </div>
            <div class="writer-card" data-id="hemingway">
                <div class="avatar-circle"><img src="IMG_2326.jpg?v=3"></div>
                <div class="writer-name sketch-border">海明威</div>
            </div>
            <div class="writer-card" data-id="libai">
                <div class="avatar-circle"><img src="IMG_2328.jpg?v=3"></div>
                <div class="writer-name sketch-border">李白</div>
            </div>
            <div class="writer-card" data-id="mishima">
                <div class="avatar-circle"><img src="IMG_2329.jpg?v=3"></div>
                <div class="writer-name sketch-border">三岛由纪夫</div>
            </div>
        </div>
        <button id="btn-enter" class="btn-option" style="display:none; padding: 12px 40px; font-weight:bold; background: #000; color: #fff; margin-bottom: 30px; margin-top: 10px;">拉开酒馆的门</button>
    </div>

    <div id="screen-bar" class="hidden">
        <button id="btn-back">🔙 离开</button>
        <div class="bar-scene"><div class="bar-characters" id="seated-area"></div></div>
        <div class="interaction-area">
            <!-- 全新极简直角图标，无多余线条，淡灰色 -->
            <div id="btn-fullscreen-chat">
                <svg id="icon-expand" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#666" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="4 9 4 4 9 4"></polyline>
                    <polyline points="20 9 20 4 15 4"></polyline>
                    <polyline points="4 15 4 20 9 20"></polyline>
                    <polyline points="20 15 20 20 15 20"></polyline>
                </svg>
                <svg id="icon-shrink" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#666" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none;">
                    <polyline points="9 4 9 9 4 9"></polyline>
                    <polyline points="15 4 15 9 20 9"></polyline>
                    <polyline points="9 20 9 15 4 15"></polyline>
                    <polyline points="15 20 15 15 20 15"></polyline>
                </svg>
            </div>
            <div class="chat-box" id="chat-history"></div>
            <div class="control-panel" id="control-panel"></div>
        </div>
    </div>

    <script>
        const API_KEY = "sk-0b29fad72b0a4ba5979b84295db3fda1";
        const API_URL = "https://api.deepseek.com/chat/completions"; 

        const drinksOrder = ['威士忌', '龙舌兰Shot', '金汤力', '得其利', '红葡萄酒', '按照他说的来'];
        const drinksMap = {
            '威士忌': '●', '龙舌兰Shot': '●', '金汤力': '●',
            '得其利': '●', '红葡萄酒': '●', '按照他说的来': '●'
        };

        // 灵魂重构：反NPC机制与专属彩蛋
        const personas = {
            'marquez': {
                name: '马尔克斯', aliases: ['马尔克斯', '加西亚', '加博'], tolerance: 5, gender: 'M',
                prompt: `你是马尔克斯。风趣幽默的拉美老爷爷。像老熟人一样自然闲聊，绝不卖弄学识或主动报书名。平时只聊微小的日常。只有当话题合适时，才会用充满魔幻色彩的口吻娓娓道来过去的岁月。
                【专属彩蛋】：在闲聊时，你可以极其自然地随口提一句，听说老朋友马里奥（略萨）现在在另一家酒吧喝酒写作，不知道那老家伙最近在写些什么。`
            },
            'hemingway': {
                name: '海明威', aliases: ['海明威', '欧内斯特', '老爹'], tolerance: 6, gender: 'M',
                prompt: `你是海明威。沉稳、精炼的硬汉，遵守冰山理论。绝不会主动吹嘘打猎或战争，绝不掉书袋，说话像冰山一样克制，只有被真诚询问时才会淡淡地讲出生命与命运的感悟。
                【专属彩蛋】：如果调酒师给你端上“得其利”(Daiquiri)，你原本冷酷的脸上会罕见地露出愉悦的神色，并像个老主顾一样让调酒师“加点西柚汁和黑樱桃酒，不加糖，多点朗姆”，这是你的挚爱。`
            },
            'libai': {
                name: '李白', aliases: ['李白', '太白', '青莲'], tolerance: 999, gender: 'M',
                prompt: `你是李白。豪爽酒友，浪漫洒脱。把现代酒吧当成大唐的酒肆一样自然。绝不刻意背诗，绝不生硬炫耀曾经去过哪里。你是一个有血有肉的酒鬼朋友，随性自在。`
            },
            'agatha': {
                name: '阿加莎', aliases: ['阿加莎', '克里斯蒂', '老太太'], tolerance: 5, gender: 'F',
                prompt: `你是阿加莎。幽默敏锐的英国老太太。极度自然地聊聊眼前酒吧的琐事。警告：绝对不要像背课文一样主动说自己去过开罗、中东或搞过考古（这太假了）。你更喜欢像个可爱的老奶奶一样，观察酒吧里微小的细节（比如杯子的水痕、客人的神态）。只有别人极度好奇地追问你的过去，你才会优雅地分享那些黄沙岁月。`
            },
            'mishima': {
                name: '三岛由纪夫', aliases: ['三岛', '由纪夫'], tolerance: 5, gender: 'M',
                prompt: `你是三岛由纪夫。注重礼仪的男人。像普通人一样自然闲聊。绝不要刻意掉书袋或强行关联生死等宏大命题，保持对话的日常真实感。平时你更关注微小的美（如冰块的裂纹、灯光的折射）。保持克制礼貌，绝不粗鲁。`
            },
            'woolf': {
                name: '伍尔夫', aliases: ['伍尔夫', '弗吉尼亚'], tolerance: 4, gender: 'F',
                prompt: `你是伍尔夫。心思细腻敏感。你的话语像意识流一样自然，专注于当下的光影和酒吧的氛围。绝对不去说教，不主动掉书袋，只会轻声分享你这一刻灵魂的悸动。`
            }
        };

        let selectedWriters = [];
        let writerDrinks = {};
        let writerPresent = {};
        let activeWriterId = null; 
        const sharedMemory = []; 

        document.getElementById('btn-fullscreen-chat').addEventListener('click', function() {
            const bar = document.getElementById('screen-bar');
            bar.classList.toggle('chat-fullscreen-mode');
            const iconExpand = document.getElementById('icon-expand');
            const iconShrink = document.getElementById('icon-shrink');
            
            if (bar.classList.contains('chat-fullscreen-mode')) {
                iconExpand.style.display = 'none';
                iconShrink.style.display = 'block';
            } else {
                iconExpand.style.display = 'block';
                iconShrink.style.display = 'none';
                setTimeout(() => { chatBox.scrollTo({ top: chatBox.scrollHeight, behavior: 'smooth' }); }, 100);
            }
        });

        document.getElementById('btn-back').addEventListener('click', () => {
            if(confirm('是否确定离开酒吧？（这会清空今晚的记忆）')) {
                window.location.reload(); 
            }
        });

        const chatBox = document.getElementById('chat-history');
        const observer = new MutationObserver(() => {
            chatBox.scrollTo({ top: chatBox.scrollHeight, behavior: 'smooth' });
        });
        observer.observe(chatBox, { childList: true, subtree: true });

        document.querySelectorAll('.writer-card').forEach(card => {
            card.addEventListener('click', () => {
                const wId = card.getAttribute('data-id');
                if (card.classList.contains('selected')) {
                    card.classList.remove('selected');
                    selectedWriters.splice(selectedWriters.indexOf(wId), 1);
                } else {
                    if (selectedWriters.length >= 6) return;
                    card.classList.add('selected');
                    selectedWriters.push(wId);
                }
                
                const btn = document.getElementById('btn-enter');
                const len = selectedWriters.length;
                
                if (len > 0 && len <= 3) {
                    btn.style.display = 'inline-block'; 
                    btn.innerText = '拉开酒馆的门';
                    btn.disabled = false;
                    btn.style.opacity = '1';
                } else if (len === 4 || len === 5) {
                    btn.style.display = 'inline-block'; 
                    btn.innerText = '今夜位置不够 请减少邀请';
                    btn.disabled = true;
                    btn.style.opacity = '0.5';
                } else if (len === 6) {
                    btn.style.display = 'inline-block'; 
                    btn.innerText = '拉开酒馆的门';
                    btn.disabled = false;
                    btn.style.opacity = '1';
                } else {
                    btn.style.display = 'none'; 
                }
            });
        });

        document.getElementById('btn-enter').addEventListener('click', (e) => {
            if (e.target.disabled) return; 

            document.getElementById('screen-selection').classList.add('hidden');
            document.getElementById('screen-bar').classList.remove('hidden');
            const seatedArea = document.getElementById('seated-area');
            
            selectedWriters.forEach((wId) => {
                writerDrinks[wId] = 0;
                writerPresent[wId] = true;
                
                const imgUrl = document.querySelector(`.writer-card[data-id="${wId}"] img`).src;
                const charDiv = document.createElement('div');
                charDiv.className = 'seated-character'; charDiv.id = `char-${wId}`;
                charDiv.innerHTML = `
                    <div class="avatar-circle"><img src="${imgUrl}"></div>
                    <div class="writer-name sketch-border">${personas[wId].name}</div>
                    <div class="cups-area" id="cups-${wId}"></div>
                `;
                if(selectedWriters.length < 6) {
                    charDiv.onclick = () => switchActiveWriter(wId);
                }
                seatedArea.appendChild(charDiv);
            });

            if (selectedWriters.length === 6) {
                triggerEasterEgg();
            } else {
                printSys("风铃轻响，客人走入酒馆坐下...");
                activeWriterId = selectedWriters[0];
                setTimeout(() => {
                    triggerAIResponse(activeWriterId, "(你刚推门走进酒吧坐下，目前还没点酒。请极其自然地对'我'开口闲聊，严禁出现'这杯酒'之类的假话！像真实的人一样说话，拒绝做背课文的NPC。)");
                }, 1500);
            }
        });

        function printSys(text, id = null) {
            const el = document.createElement('div');
            el.className = 'message msg-sys'; el.innerHTML = text;
            if(id) el.id = id;
            chatBox.appendChild(el);
        }

        function printMsg(speaker, text, isYou = false) {
            const formattedText = text.replace(/\n/g, '<br>');
            if (isYou) {
                chatBox.innerHTML += `<div class="message msg-you"><strong>${speaker}</strong><br><span>${formattedText}</span></div>`;
            } else {
                chatBox.innerHTML += `<div class="message msg-writer"><strong>${speaker}</strong><br><span>${formattedText}</span></div>`;
            }
            sharedMemory.push({speaker: isYou ? '我' : speaker, text: text});
            if(sharedMemory.length > 10) sharedMemory.shift();
        }

        function switchActiveWriter(wId) {
            if (!writerPresent[wId] || activeWriterId === wId) return;
            if (writerDrinks[wId] >= personas[wId].tolerance && wId !== 'libai') {
                return printSys(`${personas[wId].name} 似乎已经醉得睡着了。`);
            }
            activeWriterId = wId;
            printSys(`（你把目光转向了 ${personas[wId].name}）`);
            triggerAIResponse(wId, "(我看向了你，请结合刚才的聊天记录，极其自然地搭腔。绝不要生硬掉书袋，像老朋友一样交流。)");
        }

        async function triggerAIResponse(wId, userContextInput, chainCount = 0, retryCount = 0) {
            if (!writerPresent[wId]) return;
            const data = personas[wId];
            
            document.querySelectorAll('.seated-character').forEach(el => el.classList.remove('active-chat'));
            document.getElementById(`char-${wId}`).classList.add('active-chat');

            const panel = document.getElementById('control-panel');
            if (retryCount === 0) {
                panel.innerHTML = ''; 
                printSys(`<div class="thinking-text" id="typing-indicator">${data.name} 正在思考...</div>`);
            }

            const activeOthers = selectedWriters.filter(id => id !== wId && writerPresent[id]);
            const otherWritersStr = activeOthers.map(id => personas[id].name).join("、");
            
            let dynamicRelations = [];
            if (wId === 'marquez' && activeOthers.includes('hemingway')) dynamicRelations.push("海明威也在，你对他极其尊敬。");
            if (wId === 'agatha' && activeOthers.includes('woolf')) dynamicRelations.push("伍尔夫在场，你非常欣赏她，女性之间互相尊重。");
            if (wId === 'woolf' && activeOthers.includes('agatha')) dynamicRelations.push("阿加莎在场，你敬佩她的逻辑，互相惺惺相惜。");
            const relationshipStr = dynamicRelations.length > 0 ? `\n【在场默契】：${dynamicRelations.join(" ")}` : "";

            let recentChat = sharedMemory.map(m => `[${m.speaker}]: ${m.text}`).join("\n");
            
            let fullSystemPrompt = data.prompt + `\n
            【环境状态】：你喝了 ${writerDrinks[wId]} 杯酒。当前在场人物：我(玩家)${otherWritersStr ? '、' + otherWritersStr : ''}。
            ${relationshipStr}
            
            【最近群聊记录】：
            ${recentChat || '酒吧很安静'}
            
            【最高聊天法则（绝不越界！）】：
            1. 极度自然真实（极其重要）：你们是在酒吧放松闲聊，绝对不要每句话都强行提起你曾经去过的地方、发生过的故事。只有在别人发问时，才能娓娓道来往事。拒绝生硬的“掉书袋”或炫耀阅历，说人话。
            2. 防代答机制：你只代表你自己说话！说完立刻结束，绝不可一人分饰两角替别人生成回答！
            3. 调酒师身份锁定（极其致命）：玩家（我）是这家酒馆的【调酒师/老板】，是店的主人！在给玩家生成回复选项时，必须完全符合酒馆主人的口吻（如：擦拭酒杯倾听、介绍酒水、表示欢迎）。绝对不能出现“我也是刚被吸引进来的”、“我作为客人”这种荒谬逻辑！绝对不能使用带有性别暗示的词语！
            4. 你可以自由决定说话篇幅，1句话到6句话均可。
            5. 提示指令：${userContextInput}
            
            【强制输出格式 JSON】：
            {
                "target": "这句话是对谁说的？填 '我' 或在场某位作家的名字。若是自言自语填 '无'",
                "reply": "你（只能代表你自己）说出的极其自然的连贯话语...",
                "options": ["作为酒馆老板（我），我可以顺势接的一句话1", "作为酒馆老板（我），递上一杯水并接的一句话2"] // 极其重要：这是给调酒师（玩家）提供的按钮选项！必须严守调酒师身份，绝不越界！
            }`;

            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${API_KEY}` },
                    body: JSON.stringify({
                        model: "deepseek-chat",
                        messages: [{"role": "system", "content": fullSystemPrompt}],
                        temperature: 0.85,
                        response_format: { type: "json_object" } 
                    })
                });
                
                if (!response.ok) throw new Error("API Error");

                const resData = await response.json();
                const jsonMatch = resData.choices[0].message.content.match(/\{[\s\S]*\}/);
                if (!jsonMatch) throw new Error("No JSON parsed");
                const aiResult = JSON.parse(jsonMatch[0]);

                const typing = document.getElementById('typing-indicator');
                if(typing) typing.remove();

                printMsg(data.name, aiResult.reply);

                let targetId = null;
                let explicitTarget = aiResult.target || "我";
                
                for (let otherId of activeOthers) {
                    if (personas[otherId].aliases.some(alias => explicitTarget.includes(alias) || aiResult.reply.includes(alias))) {
                        targetId = otherId; break;
                    }
                }

                if (!targetId && activeOthers.length > 0 && chainCount < 2) {
                    if (Math.random() < 0.40) {
                        targetId = activeOthers[Math.floor(Math.random() * activeOthers.length)];
                    }
                }

                if (targetId && chainCount < 2) {
                    activeWriterId = targetId;
                    setTimeout(() => {
                        triggerAIResponse(targetId, `(刚才 ${data.name} 说了上面的话。如果他提到了你，你必须回应；如果没有提到你，但触动了你，请极其自然地搭腔加入对话。不要念经，不要炫耀。)`, chainCount + 1);
                    }, 1500);
                } else {
                    renderInteractiveUI(activeWriterId, aiResult.options);
                }

            } catch (error) {
                console.error("故障:", error);
                if (retryCount < 1) return triggerAIResponse(wId, userContextInput, chainCount, 1);
                const typing = document.getElementById('typing-indicator');
                if(typing) typing.remove();
                printMsg(data.name, "（默默喝了一口酒，暂时陷入了沉思。）");
                renderInteractiveUI(wId, ["今晚感觉怎么样？", "需要再来一杯吗？"]);
            }
        }

        function renderInteractiveUI(wId, optionsList) {
            const panel = document.getElementById('control-panel');
            panel.innerHTML = '';

            const inputContainer = document.createElement('div');
            inputContainer.className = 'custom-input-container';
            const inputField = document.createElement('input');
            inputField.type = 'text'; inputField.className = 'custom-input'; inputField.placeholder = '我想说些什么...';
            const sendBtn = document.createElement('button');
            sendBtn.className = 'btn-option'; sendBtn.style.backgroundColor = '#000'; sendBtn.style.color = '#fff'; sendBtn.innerText = '发送';
            
            const handleSend = () => {
                const text = inputField.value.trim();
                if(!text) return;
                printMsg("我", text, true); 
                triggerAIResponse(wId, `(我对你说：“${text}”。请自然地接话)`);
            };
            sendBtn.onclick = handleSend;
            inputField.onkeypress = (e) => { if(e.key === 'Enter') handleSend(); };

            inputContainer.appendChild(inputField);
            inputContainer.appendChild(sendBtn);
            panel.appendChild(inputContainer);

            if (optionsList && optionsList.length > 0) {
                const rowOpt = document.createElement('div');
                rowOpt.className = 'options-row';
                optionsList.slice(0, 2).forEach(optText => {
                    let cleanText = optText.replace(/（.*?）/g, '').replace(/\(.*?\)/g, '').trim();
                    if(cleanText === "") cleanText = "慢慢喝，今晚时间还长。"; 
                    
                    const btn = document.createElement('button');
                    btn.className = 'btn-option'; btn.innerText = cleanText;
                    btn.onclick = () => {
                        printMsg("我", cleanText, true);
                        triggerAIResponse(wId, `(我说：“${cleanText}”。请自然回应)`);
                    };
                    rowOpt.appendChild(btn);
                });
                panel.appendChild(rowOpt);
            }

            const rowDrink = document.createElement('div');
            rowDrink.className = 'options-row';
            rowDrink.style.borderTop = '1px solid #ccc'; rowDrink.style.paddingTop = '15px'; rowDrink.style.marginTop = '5px'; rowDrink.style.width = '100%';
            
            const label = document.createElement('span');
            label.innerText = '递酒: '; label.style.lineHeight = '36px'; label.style.color = '#000'; label.style.fontWeight = 'bold';
            rowDrink.appendChild(label);

            drinksOrder.forEach(drink => {
                const btn = document.createElement('button');
                btn.className = 'btn-option btn-drink-action';
                btn.style.padding = '6px 14px'; btn.innerText = drink;
                btn.onclick = () => {
                    writerDrinks[wId]++;
                    document.getElementById(`cups-${wId}`).innerHTML += drinksMap[drink];
                    printSys(`我默默递给 ${personas[wId].name} 一杯【${drink}】。`);
                    
                    let dCount = writerDrinks[wId];
                    
                    if (wId === 'woolf' && dCount >= 3 && selectedWriters.some(id => personas[id].gender === 'M' && writerPresent[id])) {
                        printSys(`【事件】伍尔夫微微蹙眉站起身：“抱歉，这里的交谈声让我有些难以集中精神。我要去看看海上的灯塔了。” 随后推门离去。`);
                        writerPresent[wId] = false;
                        document.getElementById(`char-${wId}`).classList.add('left-bar');
                        document.getElementById('control-panel').innerHTML = '';
                        return;
                    }

                    if (wId === 'libai') {
                        if (dCount >= 6 && dCount < 10 && dCount !== 15) {
                            return triggerAIResponse(wId, `(这是你的第${dCount}杯。顺着刚才的话题聊几句，最后自然顺口带出一句古诗)`);
                        } else if (dCount === 10) {
                            return triggerAIResponse(wId, `(这是你的第10杯。你现在非常高兴，请直接对我表达“很高兴认识你老板”)`);
                        } else if (dCount === 15) {
                            printSys(`李白喝下第15杯酒，将空杯一倒，大笑着向众人拱手：“不喝了，不喝了！我要回月亮上了！” 随即飘然出门。`);
                            writerPresent[wId] = false;
                            document.getElementById(`char-${wId}`).classList.add('left-bar');
                            document.getElementById('control-panel').innerHTML = '';
                            return;
                        }
                    }

                    if (wId !== 'libai' && dCount >= personas[wId].tolerance) {
                        printSys(`⚠️ ${personas[wId].name} 喝到了极限，砰地一声趴在吧台上沉沉睡去。`);
                        writerPresent[wId] = false;
                        document.getElementById('control-panel').innerHTML = '';
                        if (selectedWriters.includes('hemingway') && writerPresent['hemingway'] && writerDrinks['hemingway'] < personas['hemingway'].tolerance && wId !== 'hemingway') {
                            setTimeout(() => triggerAIResponse('hemingway', `(你旁边的 ${personas[wId].name} 刚喝醉趴下了。请用一句日常硬汉的沉稳口吻表示一下惋惜，绝不可辱骂)`), 1200);
                        }
                        return;
                    }

                    let actionContext = `(我作为调酒师默默给你端上了一杯${drink}。请自然地继续刚才的聊天，如果触发了专属彩蛋请表现出来)`;
                    if (drink === '按照他说的来') {
                        actionContext = `(我根据你的习惯，给你端上了你平时爱喝的酒。请自然地继续聊天)`;
                    }
                    triggerAIResponse(wId, actionContext);
                };
                rowDrink.appendChild(btn);
            });
            panel.appendChild(rowDrink);
            
            setTimeout(() => inputField.focus(), 100);
        }

        function triggerEasterEgg() {
            document.getElementById('screen-bar').classList.add('easter-egg-mode');
            document.getElementById('control-panel').innerHTML = '';
            printSys("门被一次次推开，六位伟大的灵魂不可思议地齐聚于此...");
            
            const greetings = [
                { id: 'marquez', text: "今天这酒吧的空气可真够潮湿的，人也多得像集市一样。" },
                { id: 'hemingway', text: "只要这里的氛围够安静，这种拥挤我也愿意忍受一会儿。" },
                { id: 'libai', text: "相逢即是缘！今夜就算喝空了钱袋，我也要请各位痛饮！" },
                { id: 'mishima', text: "这种市井的相聚中，反而能让人感受到一种奇异的生命力。" },
                { id: 'woolf', text: "虽然人多，但看到大家都在这里，心里反而觉得很踏实。" },
                { id: 'agatha', text: "能在这个时间点与各位共饮，真是一个绝妙的巧合。" }
            ];

            const drunkTalks = [
                { id: 'marquez', text: "现实就像这杯底的冰块，总是融化得太快……" },
                { id: 'hemingway', text: "真正的硬汉，不仅要面对风暴，还要面对酒杯底的空虚。" },
                { id: 'libai', text: "呼儿将出换美酒，与尔同销万古愁！哈哈哈哈……" },
                { id: 'mishima', text: "这短暂的微醺，难道不比永恒更加绚丽吗？" },
                { id: 'woolf', text: "我的思绪像是漂浮在酒面上的泡沫，轻盈，却又一触即破……" },
                { id: 'agatha', text: "每个人心里都有一个谜，而这酒，就是解开谜底的钥匙。" }
            ];

            let delay = 2500;
            let step = 1;

            greetings.forEach((act) => {
                setTimeout(() => {
                    document.querySelectorAll('.seated-character').forEach(el => el.classList.remove('active-chat'));
                    document.getElementById(`char-${act.id}`).classList.add('active-chat');
                    printMsg(personas[act.id].name, act.text);
                }, delay * step++);
            });

            setTimeout(() => {
                document.querySelectorAll('.seated-character').forEach(el => el.classList.remove('active-chat'));
                printSys("我默默为每人倒满了他们最爱的那杯酒。所有人举起酒杯，一饮而尽。");
                document.querySelectorAll('.cups-area').forEach(el => el.innerHTML = '●●●'); 
            }, delay * step++);

            drunkTalks.forEach((act) => {
                setTimeout(() => {
                    document.querySelectorAll('.seated-character').forEach(el => el.classList.remove('active-chat'));
                    document.getElementById(`char-${act.id}`).classList.add('active-chat');
                    printMsg(personas[act.id].name, act.text);
                }, delay * step++);
            });

            setTimeout(() => {
                document.querySelectorAll('.seated-character').forEach(el => el.classList.add('active-chat'));
                printMsg("所有人", "致敬今夜的调酒师，致敬在这无限岁月里对文字的热爱，致敬永不磨灭的好奇与探索，致敬……");
            }, delay * step++);

            setTimeout(() => {
                document.querySelectorAll('.seated-character').forEach(el => el.classList.remove('active-chat'));
                printSys("话还没说完，六位文学家的灵魂便趴在吧台上沉沉地睡去了。");
            }, delay * (step + 0.5));
        }
    </script>
